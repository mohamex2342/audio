<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>AudioPro Production</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        .box { background: #1e293b; padding: 2rem; border-radius: 20px; text-align: center; width: 400px; }
        .btn { background: #6366f1; color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>معالجة ملف من جهازك</h2>
        <input type="file" id="filePicker" style="margin: 20px 0;">
        <button class="btn" onclick="uploadAndProcess()">رفع ومعالجة الملف</button>
        <div id="status" style="margin-top: 20px;"></div>
    </div>

    <script>
        const API_KEY = "cvk__v9UVUk_3Ds.36aaAgx3dg-laiHpdK5_JT5rQzY0_gyhKj3WX3lkMbQ";
        
        async function uploadAndProcess() {
            const fileInput = document.getElementById('filePicker');
            if (fileInput.files.length === 0) return alert("اختر ملفاً أولاً");

            const file = fileInput.files[0];
            const status = document.getElementById('status');
            
            // 1. رفع الملف لسيرفر مؤقت (File.io) للحصول على رابط
            status.innerText = "جاري رفع الملف للسيرفر المؤقت...";
            const formData = new FormData();
            formData.append('file', file);
            
            const uploadRes = await fetch('https://file.io', { method: 'POST', body: formData });
            const uploadData = await uploadRes.json();
            const fileUrl = uploadData.link;

            // 2. إرسال الرابط إلى Cleanvoice
            status.innerText = "تم الرفع! جاري المعالجة بـ AI...";
            const processRes = await fetch('https://api.cleanvoice.ai/v2/edits', {
                method: 'POST',
                headers: { 'X-API-Key': API_KEY, 'Content-Type': 'application/json' },
                body: JSON.stringify({ "input": { "files": [fileUrl], "config": { "studio_sound": true } } })
            });

            if (processRes.status === 402) return status.innerText = "خطأ: رصيد الـ API منتهي.";
            const processData = await processRes.json();
            
            // 3. المتابعة
            pollStatus(processData.id);
        }

        async function pollStatus(id) {
            const check = setInterval(async () => {
                const res = await fetch(`https://api.cleanvoice.ai/v2/edits/${id}`, { headers: { 'X-API-Key': API_KEY } });
                const data = await res.json();
                document.getElementById('status').innerText = "الحالة: " + data.status;

                if (data.status === 'SUCCESS') {
                    clearInterval(check);
                    const link = data.result.files ? data.result.files[0] : data.download_url;
                    document.getElementById('status').innerHTML = `<a href="${link}" target="_blank" style="color:white">✅ اكتملت المعالجة - اضغط للتحميل</a>`;
                }
            }, 5000);
        }
    </script>
</body>
</html>
