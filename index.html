<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio & Video Enhancer | Cleanvoice AI</title>
    <style>
        /* التنسيقات الاحترافية مع دعم Glassmorphism */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #6366f1;
            --secondary: #ec4899;
            --background: #0f172a;
            --surface: #1e293b;
            --text: #f8fafc;
            --gradient: linear-gradient(135deg, #6366f1 0%, #ec4899 100%);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--background);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 800px; padding: 2rem; }

        .card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            border-radius: 24px;
            padding: 2.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .upload-zone {
            border: 2px dashed #475569;
            border-radius: 16px;
            padding: 3rem;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 2rem;
        }

        .upload-zone:hover { border-color: var(--primary); background: rgba(99, 102, 241, 0.05); }

        .btn {
            padding: 1rem 2.5rem;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            font-size: 1rem;
        }

        .btn-primary { background: var(--gradient); color: white; width: 100%; }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Progress Ring */
        .progress-container { display: none; margin: 2rem 0; }
        .progress-ring-circle {
            fill: none;
            stroke: url(#ringGradient);
            stroke-width: 8;
            stroke-dasharray: 440;
            stroke-dashoffset: 440;
            transition: stroke-dashoffset 0.5s ease;
            stroke-linecap: round;
        }

        .status-badge {
            display: inline-block;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            background: rgba(99, 102, 241, 0.2);
            color: var(--primary);
            margin-top: 1rem;
            font-size: 0.9rem;
        }

        .notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            padding: 1rem 2rem;
            border-radius: 10px;
            z-index: 1000;
            transition: 0.5s;
        }
        .notification.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

    <div id="notif" class="notification"></div>

    <div class="container">
        <header style="margin-bottom: 2rem; text-align: center;">
            <h1 style="background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 2.5rem;">Cleanvoice AI</h1>
            <p style="color: #94a3b8;">محسن الصوت والفيديو المعتمد على الذكاء الاصطناعي</p>
        </header>

        <div class="card">
            <div id="dropZone" class="upload-zone">
                <div id="fileInfo">
                    <span style="font-size: 3rem;">☁️</span>
                    <h3>اسحب ملف الصوت/الفيديو هنا</h3>
                    <p>أو انقر للاختيار من جهازك</p>
                </div>
                <input type="file" id="fileInput" hidden accept="audio/*,video/*">
            </div>

            <div id="previewArea" style="display: none;">
                <div id="mediaContainer" style="margin-bottom: 1.5rem;"></div>
                <button id="processBtn" class="btn btn-primary">🚀 بدء المعالجة الاحترافية</button>
            </div>

            <div id="progressArea" class="progress-container">
                <svg width="150" height="150" style="transform: rotate(-90deg)">
                    <defs>
                        <linearGradient id="ringGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" stop-color="#6366f1" />
                            <stop offset="100%" stop-color="#ec4899" />
                        </linearGradient>
                    </defs>
                    <circle cx="75" cy="75" r="70" stroke="#334155" stroke-width="8" fill="none" />
                    <circle id="ringFill" cx="75" cy="75" r="70" class="progress-ring-circle" />
                </svg>
                <div id="statusLabel" class="status-badge">جاري المعالجة...</div>
                <h2 id="percentLabel" style="margin-top: 10px;">0%</h2>
            </div>

            <div id="resultArea" style="display: none;">
                <div style="font-size: 3rem; margin-bottom: 1rem;">✨</div>
                <h2>جاهز للتحميل!</h2>
                <button id="downloadBtn" class="btn btn-primary" style="margin-top: 1rem;">⬇️ تحميل الملف المحسن</button>
                <button onclick="location.reload()" class="btn" style="background: none; color: #94a3b8; margin-top: 10px;">رفع ملف آخر</button>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = "cvk__v9UVUk_3Ds.36aaAgx3dg-laiHpdK5_JT5rQzY0_gyhKj3WX3lkMbQ";
        const BASE_URL = "https://api.cleanvoice.ai/v2/edits";

        let selectedFile = null;

        // عناصر الواجهة
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const ringFill = document.getElementById('ringFill');

        dropZone.onclick = () => fileInput.click();

        fileInput.onchange = (e) => {
            if (e.target.files.length > 0) {
                selectedFile = e.target.files[0];
                showPreview();
            }
        };

        function showPreview() {
            dropZone.style.display = 'none';
            document.getElementById('previewArea').style.display = 'block';
            const container = document.getElementById('mediaContainer');
            const url = URL.createObjectURL(selectedFile);
            
            if (selectedFile.type.startsWith('video/')) {
                container.innerHTML = `<video src="${url}" controls style="width:100%; border-radius:12px;"></video>`;
            } else {
                container.innerHTML = `<audio src="${url}" controls style="width:100%;"></audio>`;
            }
        }

        document.getElementById('processBtn').onclick = startProcessing;

        async function startProcessing() {
            document.getElementById('previewArea').style.display = 'none';
            document.getElementById('progressArea').style.display = 'block';

            try {
                // 1. ملاحظة: Cleanvoice V2 تتطلب رابط مباشر للملف أو رفعه أولاً. 
                // بما أننا نستخدم ملفاً محلياً، سنقوم بمحاكاة الخطوة الأولى للحصول على الـ ID
                // في الإنتاج الحقيقي، يجب رفع الملف إلى S3 أو خادمك أولاً للحصول على URL.
                
                // سنستخدم ملف العينة الخاص بهم للتجربة حسب الكود الذي قدمته أنت:
                const isVideo = selectedFile.type.startsWith('video/');
                const payload = {
                    "input": {
                        "files": ["https://cdn.cleanvoice.ai/assets/sample.mp3"], // استبدل بـ URL ملفك المرفوع
                        "config": {
                            "video": isVideo,
                            "normalize": true,
                            "studio_sound": true,
                            "fillers": true,
                            "long_silences": true
                        }
                    }
                };

                updateUI(10, "بدء الطلب...");

                const response = await fetch(BASE_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "X-API-Key": API_KEY },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) throw new Error("فشل الاتصال بـ API");
                const result = await response.json();
                const taskId = result.id;

                // 2. المتابعة (Polling)
                pollStatus(taskId);

            } catch (err) {
                showNotif(err.message, "red");
            }
        }

        async function pollStatus(taskId) {
            const pollUrl = `${BASE_URL}/${taskId}`;
            let completed = false;

            while (!completed) {
                try {
                    const res = await fetch(pollUrl, {
                        headers: { "X-API-Key": API_KEY }
                    });
                    const data = await res.json();

                    if (data.status === 'SUCCESS') {
                        updateUI(100, "اكتمل بنجاح!");
                        showFinalResult(data.result.files[0]);
                        completed = true;
                    } else if (data.status === 'FAILED') {
                        throw new Error("فشلت المعالجة بالسيرفر");
                    } else {
                        const prog = data.progress || 20;
                        updateUI(prog, "جاري تحسين الجودة...");
                        await new Promise(r => setTimeout(r, 3000));
                    }
                } catch (e) {
                    showNotif(e.message, "red");
                    break;
                }
            }
        }

        function updateUI(percent, status) {
            const offset = 440 - (percent / 100) * 440;
            ringFill.style.strokeDashoffset = offset;
            document.getElementById('percentLabel').innerText = Math.round(percent) + "%";
            document.getElementById('statusLabel').innerText = status;
        }

        function showFinalResult(downloadUrl) {
            document.getElementById('progressArea').style.display = 'none';
            document.getElementById('resultArea').style.display = 'block';
            document.getElementById('downloadBtn').onclick = () => window.open(downloadUrl, '_blank');
        }

        function showNotif(msg, color) {
            const n = document.getElementById('notif');
            n.innerText = msg;
            n.style.background = color === "red" ? "#ef4444" : "#10b981";
            n.classList.add('show');
            setTimeout(() => n.classList.remove('show'), 4000);
        }
    </script>
</body>
</html>
