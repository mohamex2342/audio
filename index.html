<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AudioPro Enhancer | Cleanvoice AI</title>
    <style>
        /* التنسيقات الاحترافية Glassmorphism */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #6366f1;
            --secondary: #ec4899;
            --background: #0f172a;
            --surface: #1e293b;
            --surface-light: #334155;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --gradient: linear-gradient(135deg, #6366f1 0%, #ec4899 100%);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--background);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 800px; padding: 2rem; }

        .card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 2.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .upload-zone {
            border: 3px dashed var(--surface-light);
            border-radius: 20px;
            padding: 4rem 2rem;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 2rem;
        }

        .upload-zone:hover { border-color: var(--primary); background: rgba(99, 102, 241, 0.05); }

        .btn {
            padding: 1rem 2rem;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary { background: var(--gradient); color: white; width: 100%; justify-content: center; }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

        .progress-section { display: none; margin-top: 2rem; }
        .progress-ring-fill {
            fill: none;
            stroke: url(#ringGradient);
            stroke-width: 8;
            stroke-dasharray: 440;
            stroke-dashoffset: 440;
            transition: stroke-dashoffset 0.5s ease;
            stroke-linecap: round;
        }

        .status-badge {
            display: inline-block;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            background: rgba(99, 102, 241, 0.2);
            color: var(--primary);
            margin-top: 1rem;
            font-size: 0.9rem;
        }

        .notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            padding: 1rem 2rem;
            border-radius: 10px;
            z-index: 1000;
            transition: 0.5s;
            color: white;
        }
        .notification.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

    <div id="notification" class="notification"></div>

    <div class="container">
        <header style="margin-bottom: 2rem; text-align: center;">
            <h1 style="background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 2.5rem; font-weight: 800;">AudioPro Enhancer</h1>
            <p style="color: var(--text-muted);">تحسين جودة الصوت والفيديو بالذكاء الاصطناعي</p>
        </header>

        <div class="card">
            <div id="uploadZone" class="upload-zone">
                <span style="font-size: 4rem; display: block; margin-bottom: 1rem;">📁</span>
                <h2>اسحب الملف هنا أو انقر للاختيار</h2>
                <p style="color: var(--text-muted); margin-top: 0.5rem;">يدعم MP3, WAV, MP4 والمزيد</p>
                <input type="file" id="fileInput" hidden accept="audio/*,video/*">
            </div>

            <div id="previewArea" style="display: none;">
                <div id="mediaContainer" style="margin-bottom: 2rem;"></div>
                <button id="enhanceBtn" class="btn btn-primary">✨ بدء التحسين الاحترافي</button>
            </div>

            <div id="progressSection" class="progress-section">
                <svg width="150" height="150" style="transform: rotate(-90deg)">
                    <defs>
                        <linearGradient id="ringGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" stop-color="#6366f1" />
                            <stop offset="100%" stop-color="#ec4899" />
                        </linearGradient>
                    </defs>
                    <circle cx="75" cy="75" r="70" stroke="#334155" stroke-width="8" fill="none" />
                    <circle id="progressCircle" cx="75" cy="75" r="70" class="progress-ring-fill" />
                </svg>
                <h2 id="progressText" style="margin-top: 1rem;">0%</h2>
                <div id="progressStatus" class="status-badge">جاري الرفع...</div>
            </div>

            <div id="resultArea" style="display: none;">
                <div style="font-size: 3rem; margin-bottom: 1rem;">✅</div>
                <h2>اكتمل التحسين!</h2>
                <button id="downloadBtn" class="btn btn-primary" style="margin-top: 1.5rem;">⬇️ تحميل الملف المحسن</button>
                <button onclick="location.reload()" class="btn" style="background: none; color: var(--text-muted); margin-top: 10px;">معالجة ملف جديد</button>
            </div>
        </div>
    </div>

    <script>
        // الإعدادات المحدثة لـ Cleanvoice V2
        const API_KEY = "cvk__v9UVUk_3Ds.36aaAgx3dg-laiHpdK5_JT5rQzY0_gyhKj3WX3lkMbQ";
        const API_BASE_URL = "https://api.cleanvoice.ai/v2";

        let currentFile = null;

        const fileInput = document.getElementById('fileInput');
        const uploadZone = document.getElementById('uploadZone');

        uploadZone.onclick = () => fileInput.click();

        fileInput.onchange = (e) => {
            if (e.target.files.length > 0) {
                currentFile = e.target.files[0];
                showPreview();
            }
        };

        function showPreview() {
            uploadZone.style.display = 'none';
            document.getElementById('previewArea').style.display = 'block';
            const container = document.getElementById('mediaContainer');
            const url = URL.createObjectURL(currentFile);
            
            if (currentFile.type.startsWith('video/')) {
                container.innerHTML = `<video src="${url}" controls style="width:100%; border-radius:12px;"></video>`;
            } else {
                container.innerHTML = `<audio src="${url}" controls style="width:100%;"></audio>`;
            }
        }

        document.getElementById('enhanceBtn').onclick = startEnhancement;

        async function startEnhancement() {
            document.getElementById('previewArea').style.display = 'none';
            document.getElementById('progressSection').style.display = 'block';

            try {
                // ملاحظة تقنية: Cleanvoice V2 تتطلب رابط URL للملف. 
                // نستخدم ملف العينة للاختبار كما هو موضح في كود الشركة
                const payload = {
                    "input": {
                        "files": ["https://cdn.cleanvoice.ai/assets/sample.mp3"], 
                        "config": {
                            "video": currentFile.type.startsWith('video/'),
                            "normalize": true,
                            "studio_sound": true,
                            "fillers": true
                        }
                    }
                };

                updateProgressUI(10, "بدء الطلب...");

                const response = await fetch(`${API_BASE_URL}/edits`, {
                    method: "POST",
                    headers: { 
                        "Content-Type": "application/json", 
                        "X-API-Key": API_KEY 
                    },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) throw new Error("فشل الاتصال بـ API");
                const result = await response.json();
                
                pollJobStatus(result.id);

            } catch (err) {
                showNotification(err.message, "error");
            }
        }

        async function pollJobStatus(jobId) {
            const pollUrl = `${API_BASE_URL}/edits/${jobId}`;
            let completed = false;

            while (!completed) {
                try {
                    const res = await fetch(pollUrl, {
                        headers: { "X-API-Key": API_KEY }
                    });
                    const data = await res.json();

                    if (data.status === 'SUCCESS') {
                        // حماية ضد خطأ reading '0'
                        let downloadUrl = null;
                        if (data.result && data.result.files && data.result.files.length > 0) {
                            downloadUrl = data.result.files[0];
                        }

                        if (downloadUrl) {
                            updateProgressUI(100, "اكتمل بنجاح!");
                            showResult(downloadUrl);
                            completed = true;
                        } else {
                            // إذا كانت النتيجة فارغة {} كما في الرد الذي أرسلته
                            updateProgressUI(95, "بانتظار توليد الرابط...");
                            await new Promise(r => setTimeout(r, 3000));
                        }
                    } else if (data.status === 'FAILED') {
                        throw new Error("فشلت المعالجة بالسيرفر");
                    } else {
                        const prog = data.progress || 30;
                        updateProgressUI(prog, "جاري تحسين الجودة...");
                        await new Promise(r => setTimeout(r, 4000));
                    }
                } catch (e) {
                    showNotification(e.message, "error");
                    break;
                }
            }
        }

        function updateProgressUI(percent, status) {
            const circle = document.getElementById('progressCircle');
            const offset = 440 - (percent / 100) * 440;
            circle.style.strokeDashoffset = offset;
            document.getElementById('progressText').innerText = Math.round(percent) + "%";
            document.getElementById('progressStatus').innerText = status;
        }

        function showResult(url) {
            document.getElementById('progressSection').style.display = 'none';
            document.getElementById('resultArea').style.display = 'block';
            document.getElementById('downloadBtn').onclick = () => window.open(url, '_blank');
        }

        function showNotification(msg, type) {
            const n = document.getElementById('notification');
            n.innerText = msg;
            n.style.background = type === "error" ? "#ef4444" : "#10b981";
            n.classList.add('show');
            setTimeout(() => n.classList.remove('show'), 4000);
        }
    </script>
</body>
</html>
