<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محسن الصوت والفيديو الاحترافي</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --background: #0f172a;
            --surface: #1e293b;
            --surface-light: #334155;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --error: #ef4444;
            --gradient: linear-gradient(135deg, #6366f1 0%, #ec4899 100%);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--background);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 20% 50%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(236, 72, 153, 0.15) 0%, transparent 50%);
            animation: bgPulse 10s ease-in-out infinite;
        }

        @keyframes bgPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }

        header { padding: 2rem; text-align: center; }
        .logo {
            font-size: 2.5rem;
            font-weight: 800;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 2rem 4rem; }

        /* Upload Section */
        .upload-section {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 3rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .upload-zone {
            border: 3px dashed var(--surface-light);
            border-radius: 20px;
            padding: 4rem 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .upload-zone.dragover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.1);
        }

        /* Toggle Switch - Optimized for RTL */
        .toggle {
            position: relative;
            width: 50px;
            height: 26px;
            background: var(--surface-light);
            border-radius: 50px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .toggle.active { background: var(--primary); }

        .toggle-slider {
            position: absolute;
            top: 3px;
            right: 3px; /* Start position for RTL */
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            transition: transform 0.3s ease;
        }

        /* Move to the left in RTL when active */
        .toggle.active .toggle-slider { transform: translateX(-24px); }

        /* Progress Ring Fixes */
        .progress-ring-fill {
            fill: none;
            stroke: url(#gradient);
            stroke-width: 8;
            stroke-linecap: round;
            stroke-dasharray: 440; /* Corrected: Circumference */
            stroke-dashoffset: 440;
            transition: stroke-dashoffset 0.5s ease;
        }

        .btn {
            padding: 1rem 2rem;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: 0.3s;
        }

        .btn-primary { background: var(--gradient); color: white; }
        .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--surface-light); }

        .notification {
            position: fixed;
            top: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            padding: 1rem 2rem;
            border-radius: 12px;
            z-index: 1000;
            opacity: 0;
            transition: 0.3s;
        }
        .notification.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .notification.success { background: rgba(16, 185, 129, 0.9); }
        .notification.error { background: rgba(239, 68, 68, 0.9); }

        /* Existing utility styles from your code... */
        .media-preview { width: 100%; border-radius: 12px; margin-bottom: 1rem; background: #000; }
        .option-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; border-bottom: 1px solid var(--surface-light); padding-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    
    <svg width="0" height="0" style="position:absolute">
        <defs>
            <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" style="stop-color:#6366f1" />
                <stop offset="100%" style="stop-color:#ec4899" />
            </linearGradient>
        </defs>
    </svg>

    <div id="notification" class="notification">
        <span id="notif-message"></span>
    </div>

    <header>
        <h1 class="logo">🎵 AudioPro Enhancer</h1>
    </header>

    <div class="container">
        <div class="upload-section">
            <div class="upload-zone" id="uploadZone">
                <span style="font-size: 3rem;">📁</span>
                <h2>اسحب الملف هنا أو انقر للاختيار</h2>
                <input type="file" id="fileInput" hidden accept="audio/*,video/*">
            </div>

            <div id="filePreview" style="display:none; margin-top: 2rem;">
                <div id="mediaContainer">
                    <video id="videoPreview" class="media-preview" controls style="display:none"></video>
                    <audio id="audioPreview" class="media-preview" controls style="display:none"></audio>
                </div>

                <div class="options-panel">
                    <div class="option-row">
                        <span>🎚️ إزالة الضوضاء</span>
                        <div class="toggle active" onclick="this.classList.toggle('active')" id="noiseReduction">
                            <div class="toggle-slider"></div>
                        </div>
                    </div>
                </div>

                <div style="display: flex; gap: 1rem; justify-content: center;">
                    <button class="btn btn-primary" id="enhanceBtn" onclick="startEnhancement()">✨ بدء التحسين</button>
                    <button class="btn btn-secondary" onclick="resetUpload()">🗑️ إلغاء</button>
                </div>
            </div>

            <div id="progressSection" style="display:none; text-align: center; margin-top: 2rem;">
                <svg width="150" height="150" style="transform: rotate(-90deg)">
                    <circle cx="75" cy="75" r="70" stroke="#334155" stroke-width="8" fill="none" />
                    <circle id="progressCircle" cx="75" cy="75" r="70" class="progress-ring-fill" />
                </svg>
                <h3 id="progressStatus">جاري الرفع...</h3>
                <p id="progressPercent">0%</p>
            </div>
        </div>
    </div>

    <script>
        // Use a placeholder for the API Key - don't hardcode in production
        const API_KEY = 'cvk_K9zHzC4T3jA.PwUHNtpD2s6jUibzKNS6O5IBxpUpqYAuhTlLB58Z-uU';
        const MAX_FILE_SIZE = 500 * 1024 * 1024; // 500MB

        let currentFile = null;
        let previewUrl = null;

        const uploadZone = document.getElementById('uploadZone');
        const fileInput = document.getElementById('fileInput');

        uploadZone.onclick = () => fileInput.click();

        fileInput.onchange = (e) => {
            if (e.target.files.length > 0) handleFile(e.target.files[0]);
        };

        // Fix: Clean memory and UI
        function resetUpload() {
            if (previewUrl) URL.revokeObjectURL(previewUrl); // Memory Leak Fix
            previewUrl = null;
            currentFile = null;
            fileInput.value = '';
            
            document.getElementById('filePreview').style.display = 'none';
            document.getElementById('progressSection').style.display = 'none';
            uploadZone.style.display = 'block';
            
            document.getElementById('videoPreview').src = '';
            document.getElementById('audioPreview').src = '';
        }

        function handleFile(file) {
            // Validation
            if (file.size > MAX_FILE_SIZE) {
                showNotification('حجم الملف كبير جداً (الأقصى 500MB)', 'error');
                return;
            }

            currentFile = file;
            if (previewUrl) URL.revokeObjectURL(previewUrl);
            previewUrl = URL.createObjectURL(file);

            uploadZone.style.display = 'none';
            const preview = document.getElementById('filePreview');
            preview.style.display = 'block';

            const video = document.getElementById('videoPreview');
            const audio = document.getElementById('audioPreview');

            if (file.type.startsWith('video/')) {
                video.src = previewUrl;
                video.style.display = 'block';
                audio.style.display = 'none';
            } else {
                audio.src = previewUrl;
                audio.style.display = 'block';
                video.style.display = 'none';
            }
        }

        // Progress Animation Fix
        function updateProgressUI(percent) {
            const circle = document.getElementById('progressCircle');
            const text = document.getElementById('progressPercent');
            const circumference = 2 * Math.PI * 70;
            
            const offset = circumference - (percent / 100) * circumference;
            circle.style.strokeDashoffset = offset;
            text.textContent = `${Math.round(percent)}%`;
        }

        async function startEnhancement() {
            document.getElementById('filePreview').style.display = 'none';
            document.getElementById('progressSection').style.display = 'block';
            
            // Simulation for demonstration (keeping your logic structure)
            let p = 0;
            const interval = setInterval(() => {
                p += 5;
                updateProgressUI(p);
                if (p >= 100) {
                    clearInterval(interval);
                    showNotification('تم التحسين بنجاح (وضع تجريبي)', 'success');
                }
            }, 200);
        }

        function showNotification(msg, type) {
            const notif = document.getElementById('notification');
            document.getElementById('notif-message').textContent = msg;
            notif.className = `notification show ${type}`;
            setTimeout(() => notif.classList.remove('show'), 3000);
        }

        // Handle Drag & Drop
        uploadZone.ondragover = (e) => { e.preventDefault(); uploadZone.classList.add('dragover'); };
        uploadZone.ondragleave = () => uploadZone.classList.remove('dragover');
        uploadZone.ondrop = (e) => {
            e.preventDefault();
            uploadZone.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]);
        };
    </script>
</body>
</html>
